<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>לומדת אוצר מילים באנגלית</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            margin-bottom: 10px;
        }

        .instructions {
            text-align: center;
            color: rgba(255,255,255,0.9);
            margin-bottom: 20px;
            font-size: 1.1em;
        }

        /* Login Screen */
        .login-screen {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 400px;
            margin: 50px auto;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        .login-screen h2 {
            color: #667eea;
            margin-bottom: 20px;
        }

        .login-screen input {
            width: 100%;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 1.1em;
            margin-bottom: 15px;
            text-align: center;
        }

        .login-screen input:focus {
            border-color: #667eea;
            outline: none;
        }

        .login-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1em;
            cursor: pointer;
            transition: transform 0.3s;
        }

        .login-btn:hover {
            transform: scale(1.02);
        }

        .existing-users {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #ddd;
        }

        .existing-users h3 {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 10px;
        }

        .user-chip {
            display: inline-block;
            padding: 8px 15px;
            background: #f0f0ff;
            border-radius: 20px;
            margin: 5px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .user-chip:hover {
            background: #667eea;
            color: white;
        }

        /* User Header */
        .user-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255,255,255,0.15);
            border-radius: 15px;
            padding: 15px 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .user-info {
            color: white;
        }

        .user-info .username {
            font-size: 1.2em;
            font-weight: bold;
        }

        .user-info .stats-mini {
            font-size: 0.9em;
            opacity: 0.9;
        }

        .user-actions {
            display: flex;
            gap: 10px;
        }

        .user-action-btn {
            padding: 8px 15px;
            background: rgba(255,255,255,0.2);
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.3s;
        }

        .user-action-btn:hover {
            background: rgba(255,255,255,0.3);
        }

        .mode-toggle {
            display: flex;
            justify-content: center;
            gap: 0;
            margin-bottom: 20px;
        }

        .mode-btn {
            padding: 12px 25px;
            border: 2px solid white;
            background: transparent;
            color: white;
            cursor: pointer;
            font-size: 1em;
            transition: all 0.3s;
        }

        .mode-btn:first-child {
            border-radius: 25px 0 0 25px;
            border-right: 1px solid white;
        }

        .mode-btn:last-child {
            border-radius: 0 25px 25px 0;
            border-left: 1px solid white;
        }

        .mode-btn.active {
            background: white;
            color: #667eea;
            font-weight: bold;
        }

        .mode-btn:hover:not(.active) {
            background: rgba(255,255,255,0.2);
        }

        .tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .tab-btn {
            padding: 12px 30px;
            border: none;
            background: rgba(255,255,255,0.2);
            color: white;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1.1em;
            transition: all 0.3s;
        }

        .tab-btn:hover {
            background: rgba(255,255,255,0.3);
            transform: translateY(-2px);
        }

        .tab-btn.active {
            background: white;
            color: #667eea;
            font-weight: bold;
        }

        .tab-btn.blacklist-tab {
            background: rgba(255,100,100,0.3);
        }

        .tab-btn.blacklist-tab.active {
            background: #ff6b6b;
            color: white;
        }

        .search-box {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }

        .search-box input {
            padding: 12px 20px;
            width: 100%;
            max-width: 400px;
            border: none;
            border-radius: 25px;
            font-size: 1em;
            outline: none;
        }

        .words-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
        }

        .word-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            position: relative;
            min-height: 100px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .word-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
        }

        .word-card.revealed {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
        }

        .word-card.blacklisted {
            border: 3px solid #ff6b6b;
        }

        .word-card.blacklisted::after {
            content: '!';
            position: absolute;
            top: 5px;
            right: 5px;
            background: #ff6b6b;
            color: white;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8em;
            font-weight: bold;
        }

        .english-word {
            font-size: 1.2em;
            font-weight: bold;
            color: #333;
            text-align: center;
            direction: ltr;
        }

        .word-card.revealed .english-word {
            color: white;
        }

        .hebrew-translation {
            font-size: 1.1em;
            color: white;
            margin-top: 10px;
            text-align: center;
            display: none;
        }

        .word-card.revealed .hebrew-translation {
            display: block;
        }

        .speaker-icon {
            position: absolute;
            top: 10px;
            left: 10px;
            font-size: 1.2em;
            opacity: 0.6;
            transition: opacity 0.3s;
        }

        .word-card:hover .speaker-icon {
            opacity: 1;
        }

        .word-card.revealed .speaker-icon {
            color: white;
        }

        .stats {
            text-align: center;
            color: white;
            margin-bottom: 15px;
            font-size: 1em;
        }

        .hidden {
            display: none !important;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .control-btn {
            padding: 10px 25px;
            border: 2px solid white;
            background: transparent;
            color: white;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1em;
            transition: all 0.3s;
        }

        .control-btn:hover {
            background: white;
            color: #667eea;
        }

        .quiz-mode {
            background: white;
            border-radius: 20px;
            padding: 30px;
            max-width: 600px;
            margin: 0 auto;
            text-align: center;
        }

        .quiz-word {
            font-size: 2em;
            color: #333;
            margin-bottom: 20px;
            direction: ltr;
        }

        .quiz-options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .quiz-option {
            padding: 15px;
            border: 2px solid #667eea;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 1.1em;
        }

        .quiz-option:hover {
            background: #f0f0ff;
        }

        .quiz-option.correct {
            background: #38ef7d;
            border-color: #38ef7d;
            color: white;
        }

        .quiz-option.wrong {
            background: #ff6b6b;
            border-color: #ff6b6b;
            color: white;
        }

        .quiz-score {
            font-size: 1.2em;
            color: #667eea;
            margin-bottom: 20px;
        }

        .quiz-next {
            padding: 12px 30px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1.1em;
            margin-top: 20px;
        }

        .quiz-next:hover {
            background: #764ba2;
        }

        .quiz-unsure {
            padding: 10px 20px;
            background: transparent;
            color: #ff9800;
            border: 2px solid #ff9800;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.95em;
            margin-top: 15px;
            transition: all 0.3s;
        }

        .quiz-unsure:hover {
            background: #ff9800;
            color: white;
        }

        .quiz-unsure.added {
            background: #ff9800;
            color: white;
            cursor: default;
        }

        .quiz-unsure.know-it {
            color: #38ef7d;
            border-color: #38ef7d;
        }

        .quiz-unsure.know-it:hover {
            background: #38ef7d;
            color: white;
        }

        .quiz-unsure.know-it.added {
            background: #38ef7d;
            color: white;
        }

        .quiz-buttons {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 15px;
        }

        .mastered-badge {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 0.85em;
            margin-right: 10px;
        }

        /* History Panel */
        .history-panel {
            background: white;
            border-radius: 20px;
            padding: 30px;
            max-width: 800px;
            margin: 0 auto;
        }

        .history-panel h2 {
            color: #667eea;
            text-align: center;
            margin-bottom: 20px;
        }

        .history-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
        }

        .stat-card .number {
            font-size: 2em;
            font-weight: bold;
        }

        .stat-card .label {
            font-size: 0.9em;
            opacity: 0.9;
        }

        .history-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            border-bottom: 1px solid #eee;
        }

        .history-item:last-child {
            border-bottom: none;
        }

        .history-item .date {
            color: #666;
            font-size: 0.9em;
        }

        .history-item .action {
            color: #333;
        }

        .history-item .result {
            font-weight: bold;
        }

        .history-item .result.good {
            color: #38ef7d;
        }

        .history-item .result.bad {
            color: #ff6b6b;
        }

        /* Blacklist Section */
        .blacklist-info {
            background: rgba(255,107,107,0.1);
            border: 2px solid #ff6b6b;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: center;
            color: white;
        }

        .blacklist-info h3 {
            margin: 0 0 10px 0;
        }

        .blacklist-info p {
            margin: 0;
            opacity: 0.9;
        }

        .clear-blacklist-btn {
            margin-top: 15px;
            padding: 10px 20px;
            background: #ff6b6b;
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
        }

        .empty-blacklist {
            text-align: center;
            color: white;
            padding: 50px;
            font-size: 1.2em;
        }

        .blacklist-header {
            text-align: center;
            margin-bottom: 20px;
        }

        .blacklist-quiz-btn {
            padding: 15px 30px;
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a5a 100%);
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 1.1em;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(255,107,107,0.3);
        }

        .blacklist-quiz-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255,107,107,0.4);
        }

        @media (max-width: 600px) {
            .words-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            }

            .word-card {
                padding: 15px;
                min-height: 80px;
            }

            .english-word {
                font-size: 1em;
            }

            .user-header {
                flex-direction: column;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Login Screen -->
        <div class="login-screen" id="loginScreen">
            <h2>ברוכים הבאים!</h2>
            <p>הזינו שם משתמש כדי להתחיל</p>
            <input type="text" id="usernameInput" placeholder="שם משתמש..." maxlength="20">
            <button class="login-btn" id="loginBtn">התחל ללמוד</button>
            <div class="existing-users" id="existingUsers"></div>
        </div>

        <!-- Main App -->
        <div id="mainApp" class="hidden">
            <h1>לומדת אוצר מילים באנגלית</h1>

            <div class="user-header">
                <div class="user-info">
                    <div class="username" id="currentUsername"></div>
                    <div class="stats-mini" id="userStatsMini"></div>
                </div>
                <div class="user-actions">
                    <button class="user-action-btn" id="historyBtn">היסטוריה</button>
                    <button class="user-action-btn" id="logoutBtn">החלף משתמש</button>
                </div>
            </div>

            <p class="instructions">לחצו על מילה כדי לראות את התרגום ולשמוע את ההגייה</p>

            <div class="mode-toggle">
                <button class="mode-btn active" data-mode="en-to-he">אנגלית → עברית</button>
                <button class="mode-btn" data-mode="he-to-en">עברית → אנגלית</button>
            </div>

            <div class="tabs">
                <button class="tab-btn active" data-list="all">כל המילים</button>
                <button class="tab-btn blacklist-tab" data-list="blacklist">רשימה שחורה</button>
                <button class="tab-btn" data-list="quiz">מבחן</button>
            </div>

            <div class="blacklist-header hidden" id="blacklistHeader">
                <button class="blacklist-quiz-btn" id="blacklistQuizBtn">התחל מבחן על הרשימה השחורה</button>
            </div>

            <div class="search-box" id="searchBox">
                <input type="text" id="searchInput" placeholder="חפש מילה...">
            </div>

            <div class="controls" id="controls">
                <button class="control-btn" id="revealAll">הצג הכל</button>
                <button class="control-btn" id="hideAll">הסתר הכל</button>
                <button class="control-btn" id="shuffle">ערבב</button>
            </div>

            <div class="stats" id="stats"></div>

            <div class="words-grid" id="wordsGrid"></div>

            <div class="quiz-mode hidden" id="quizMode">
                <div class="quiz-score" id="quizScore">ניקוד: 0/0</div>
                <div class="quiz-word" id="quizWord"></div>
                <div class="quiz-options" id="quizOptions"></div>
                <button class="quiz-unsure hidden" id="quizUnsure">לא הייתי בטוח במילה הזאת</button>
                <div class="quiz-buttons">
                    <button class="quiz-next hidden" id="quizNext">המילה הבאה</button>
                    <button class="quiz-next" id="quizExit" style="background: #999;">יציאה מהמבחן</button>
                </div>
            </div>

            <div class="history-panel hidden" id="historyPanel">
                <h2>ההיסטוריה שלי</h2>
                <div class="history-stats" id="historyStats"></div>
                <h3>פעילות אחרונה</h3>
                <div class="history-list" id="historyList"></div>
                <div style="text-align: center; margin-top: 20px;">
                    <button class="control-btn" id="closeHistory" style="border-color: #667eea; color: #667eea;">חזור</button>
                </div>
            </div>
        </div>
    </div>

    <script>

                {en: "take a risk", he: "לקחת סיכון"},
                {en: "take sb out", he: "להוציא מישהו"},
                {en: "tap", he: "ברז, להקיש"},
                {en: "temple", he: "מקדש"},
                {en: "territory", he: "טריטוריה"},
                {en: "terror", he: "טרור"},
                {en: "tie up", he: "לקשור"},
                {en: "tournament", he: "טורניר"},
                {en: "track", he: "מסלול"},
                {en: "tragedy", he: "טרגדיה"},
                {en: "triangle", he: "משולש"},
                {en: "tube", he: "שפופרת"},
                {en: "undressed", he: "לא לבוש"},
                {en: "unpack", he: "לפרוק"},
                {en: "van", he: "טנדר"},
                {en: "verse", he: "פסוק, בית שיר"},
                {en: "weapon", he: "נשק"},
                {en: "web", he: "רשת"},
                {en: "wheat", he: "חיטה"}
            ]
        };

        // User management
        let currentUser = null;
        let currentMode = 'en-to-he'; // 'en-to-he' or 'he-to-en'

        function getUsers() {
            return JSON.parse(localStorage.getItem('vocabUsers') || '[]');
        }

        function saveUsers(users) {
            localStorage.setItem('vocabUsers', JSON.stringify(users));
        }

        function getUserData(username) {
            const data = localStorage.getItem(`vocabUser_${username}`);
            const defaultData = {
                username: username,
                createdAt: new Date().toISOString(),
                // Separate data for each mode
                modes: {
                    'en-to-he': {
                        blacklist: [],
                        masteredWords: [],
                        stats: {
                            totalQuizzes: 0,
                            correctAnswers: 0,
                            totalAnswers: 0
                        }
                    },
                    'he-to-en': {
                        blacklist: [],
                        masteredWords: [],
                        stats: {
                            totalQuizzes: 0,
                            correctAnswers: 0,
                            totalAnswers: 0
                        }
                    }
                },
                history: []
            };

            if (data) {
                const parsed = JSON.parse(data);
                // Migrate old data structure if needed
                if (!parsed.modes) {
                    parsed.modes = {
                        'en-to-he': {
                            blacklist: parsed.blacklist || [],
                            masteredWords: parsed.masteredWords || [],
                            stats: parsed.stats || { totalQuizzes: 0, correctAnswers: 0, totalAnswers: 0 }
                        },
                        'he-to-en': {
                            blacklist: [],
                            masteredWords: [],
                            stats: { totalQuizzes: 0, correctAnswers: 0, totalAnswers: 0 }
                        }
                    };
                }
                return parsed;
            }
            return defaultData;
        }

        function getModeData() {
            return currentUser.modes[currentMode];
        }

        function saveUserData(userData) {
            localStorage.setItem(`vocabUser_${userData.username}`, JSON.stringify(userData));
        }

        function login(username) {
            username = username.trim();
            if (!username) return;

            let users = getUsers();
            if (!users.includes(username)) {
                users.push(username);
                saveUsers(users);
            }

            currentUser = getUserData(username);
            currentUser.lastLogin = new Date().toISOString();
            saveUserData(currentUser);

            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');
            document.getElementById('currentUsername').textContent = currentUser.username;
            updateUserStatsMini();
            renderWords(getAllWords());
        }

        function logout() {
            currentUser = null;
            document.getElementById('loginScreen').classList.remove('hidden');
            document.getElementById('mainApp').classList.add('hidden');
            document.getElementById('usernameInput').value = '';
            showExistingUsers();
        }

        function showExistingUsers() {
            const users = getUsers();
            const container = document.getElementById('existingUsers');

            if (users.length === 0) {
                container.innerHTML = '';
                return;
            }

            container.innerHTML = '<h3>משתמשים קיימים:</h3>';
            users.forEach(user => {
                const chip = document.createElement('span');
                chip.className = 'user-chip';
                chip.textContent = user;
                chip.addEventListener('click', () => login(user));
                container.appendChild(chip);
            });
        }

        function getMasteredWords() {
            const modeData = getModeData();
            const blacklistWords = new Set(modeData.blacklist.map(w => w.en));
            const masteredWords = modeData.masteredWords || [];
            return masteredWords.filter(w => !blacklistWords.has(w));
        }

        function updateUserStatsMini() {
            const modeData = getModeData();
            const stats = modeData.stats;
            const accuracy = stats.totalAnswers > 0
                ? Math.round((stats.correctAnswers / stats.totalAnswers) * 100)
                : 0;
            const totalWords = getAllWords().length;
            const mastered = getMasteredWords().length;
            const modeLabel = currentMode === 'en-to-he' ? 'EN→HE' : 'HE→EN';
            document.getElementById('userStatsMini').innerHTML =
                `<span class="mastered-badge">${modeLabel}: שולט ב-${mastered}/${totalWords}</span> מבחנים: ${stats.totalQuizzes} | דיוק: ${accuracy}% | רשימה שחורה: ${modeData.blacklist.length}`;
        }

        function addToHistory(action, details) {
            const modeLabel = currentMode === 'en-to-he' ? '[EN→HE]' : '[HE→EN]';
            currentUser.history.unshift({
                date: new Date().toISOString(),
                action: action,
                details: `${modeLabel} ${details}`,
                mode: currentMode
            });
            currentUser.history = currentUser.history.slice(0, 100);
            saveUserData(currentUser);
        }

        function addToBlacklist(word) {
            const modeData = getModeData();
            if (!modeData.blacklist.find(w => w.en === word.en)) {
                modeData.blacklist.push({
                    en: word.en,
                    he: word.he,
                    addedAt: new Date().toISOString(),
                    failCount: 1
                });
                saveUserData(currentUser);
            } else {
                const existing = modeData.blacklist.find(w => w.en === word.en);
                existing.failCount++;
                saveUserData(currentUser);
            }
        }

        function removeFromBlacklist(wordEn) {
            const modeData = getModeData();
            modeData.blacklist = modeData.blacklist.filter(w => w.en !== wordEn);
            saveUserData(currentUser);
        }

        function isBlacklisted(wordEn) {
            if (!currentUser) return false;
            const modeData = getModeData();
            return modeData.blacklist.some(w => w.en === wordEn);
        }

        // Word functions
        let currentList = 'all';
        let quizWords = [];
        let quizIndex = 0;
        let quizScore = 0;
        let quizTotal = 0;
        let quizFirstAttempts = {};

        function getAllWords() {
            let words = [];
            for (let list in vocabulary) {
                vocabulary[list].forEach(word => {
                    words.push({...word, list: list});
                });
            }
            return words;
        }

        function speak(text) {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            utterance.rate = 0.8;
            speechSynthesis.speak(utterance);
        }

        function renderWords(words) {
            const grid = document.getElementById('wordsGrid');
            grid.innerHTML = '';

            // Show/hide blacklist quiz button
            const blacklistHeader = document.getElementById('blacklistHeader');
            if (currentList === 'blacklist') {
                blacklistHeader.classList.remove('hidden');
            } else {
                blacklistHeader.classList.add('hidden');
            }

            if (currentList === 'blacklist' && words.length === 0) {
                grid.innerHTML = '<div class="empty-blacklist">אין מילים ברשימה השחורה! כל הכבוד!</div>';
                document.getElementById('stats').textContent = '';
                blacklistHeader.classList.add('hidden');
                return;
            }

            words.forEach((word) => {
                const card = document.createElement('div');
                card.className = 'word-card';
                if (isBlacklisted(word.en)) {
                    card.classList.add('blacklisted');
                }

                // Display based on current mode
                if (currentMode === 'en-to-he') {
                    card.innerHTML = `
                        <span class="speaker-icon">🔊</span>
                        <div class="english-word" style="direction: ltr;">${word.en}</div>
                        <div class="hebrew-translation">${word.he}</div>
                    `;
                } else {
                    card.innerHTML = `
                        <span class="speaker-icon">🔊</span>
                        <div class="english-word" style="direction: rtl;">${word.he}</div>
                        <div class="hebrew-translation" style="direction: ltr;">${word.en}</div>
                    `;
                }

                card.addEventListener('click', () => {
                    card.classList.toggle('revealed');
                    speak(word.en);
                });

                grid.appendChild(card);
            });

            document.getElementById('stats').textContent = `${words.length} מילים`;
        }

        function filterWords() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            let words;

            if (currentList === 'blacklist') {
                const modeData = getModeData();
                words = modeData.blacklist.map(w => ({en: w.en, he: w.he, list: 'blacklist'}));
            } else {
                words = getAllWords();
            }

            if (searchTerm) {
                words = words.filter(w =>
                    w.en.toLowerCase().includes(searchTerm) ||
                    w.he.includes(searchTerm)
                );
            }

            return words;
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        let quizBlacklistOnly = false;

        function startQuiz(blacklistOnly = false) {
            quizBlacklistOnly = blacklistOnly;
            const modeData = getModeData();

            if (blacklistOnly) {
                if (modeData.blacklist.length === 0) {
                    alert('אין מילים ברשימה השחורה! לכו ללמוד קודם.');
                    return;
                }
                quizWords = shuffleArray(modeData.blacklist.map(w => ({en: w.en, he: w.he})));
            } else {
                quizWords = shuffleArray([...getAllWords()]);
            }

            quizIndex = 0;
            quizScore = 0;
            quizTotal = 0;
            quizFirstAttempts = {};
            currentQuizWord = null;

            modeData.stats.totalQuizzes++;
            saveUserData(currentUser);
            addToHistory('quiz_start', blacklistOnly ? 'התחיל מבחן רשימה שחורה' : 'התחיל מבחן חדש');

            document.getElementById('wordsGrid').classList.add('hidden');
            document.getElementById('quizMode').classList.remove('hidden');
            document.getElementById('searchBox').classList.add('hidden');
            document.getElementById('controls').classList.add('hidden');
            document.getElementById('stats').classList.add('hidden');
            document.getElementById('quizUnsure').classList.add('hidden');
            showQuizQuestion();
        }

        function showQuizQuestion() {
            if (quizIndex >= quizWords.length) {
                quizIndex = 0;
                quizWords = shuffleArray(quizWords);
            }

            const word = quizWords[quizIndex];

            // Display question based on mode
            if (currentMode === 'en-to-he') {
                document.getElementById('quizWord').textContent = word.en;
                document.getElementById('quizWord').style.direction = 'ltr';
            } else {
                document.getElementById('quizWord').textContent = word.he;
                document.getElementById('quizWord').style.direction = 'rtl';
            }

            document.getElementById('quizScore').textContent = `ניקוד: ${quizScore}/${quizTotal}`;

            // Generate wrong answers based on mode
            let wrongAnswers, correctAnswer;
            if (currentMode === 'en-to-he') {
                correctAnswer = word.he;
                wrongAnswers = getAllWords()
                    .filter(w => w.he !== word.he)
                    .sort(() => Math.random() - 0.5)
                    .slice(0, 3)
                    .map(w => w.he);
            } else {
                correctAnswer = word.en;
                wrongAnswers = getAllWords()
                    .filter(w => w.en !== word.en)
                    .sort(() => Math.random() - 0.5)
                    .slice(0, 3)
                    .map(w => w.en);
            }

            let options = shuffleArray([correctAnswer, ...wrongAnswers]);

            const optionsDiv = document.getElementById('quizOptions');
            optionsDiv.innerHTML = '';

            options.forEach(option => {
                const btn = document.createElement('div');
                btn.className = 'quiz-option';
                btn.textContent = option;
                if (currentMode === 'he-to-en') {
                    btn.style.direction = 'ltr';
                }
                btn.addEventListener('click', () => checkAnswer(option, word, correctAnswer));
                optionsDiv.appendChild(btn);
            });

            document.getElementById('quizNext').classList.add('hidden');
        }

        let currentQuizWord = null;

        function checkAnswer(selected, word, correct) {
            const modeData = getModeData();
            const isFirstAttempt = !quizFirstAttempts[word.en];
            currentQuizWord = word;

            if (isFirstAttempt) {
                quizFirstAttempts[word.en] = true;
                quizTotal++;
                modeData.stats.totalAnswers++;
            }

            const options = document.querySelectorAll('.quiz-option');

            options.forEach(opt => {
                opt.style.pointerEvents = 'none';
                if (opt.textContent === correct) {
                    opt.classList.add('correct');
                } else if (opt.textContent === selected && selected !== correct) {
                    opt.classList.add('wrong');
                }
            });

            const unsureBtn = document.getElementById('quizUnsure');
            unsureBtn.classList.remove('added');

            // Different button text and style based on quiz type
            if (quizBlacklistOnly) {
                unsureBtn.textContent = 'עכשיו אני יודע!';
                unsureBtn.classList.add('know-it');
            } else {
                unsureBtn.textContent = 'לא הייתי בטוח במילה הזאת';
                unsureBtn.classList.remove('know-it');
            }

            if (selected === correct) {
                if (isFirstAttempt) {
                    quizScore++;
                    modeData.stats.correctAnswers++;
                    // Add to mastered words (but don't auto-remove from blacklist)
                    if (!modeData.masteredWords) {
                        modeData.masteredWords = [];
                    }
                    if (!modeData.masteredWords.includes(word.en)) {
                        modeData.masteredWords.push(word.en);
                    }
                }
                // Show button only on correct answer
                unsureBtn.classList.remove('hidden');
            } else {
                if (isFirstAttempt) {
                    addToBlacklist(word);
                    addToHistory('wrong_answer', `טעה במילה: ${word.en} (${word.he})`);
                    // Remove from mastered if it was there
                    if (modeData.masteredWords) {
                        modeData.masteredWords = modeData.masteredWords.filter(w => w !== word.en);
                    }
                }
                unsureBtn.classList.add('hidden');
            }

            saveUserData(currentUser);
            updateUserStatsMini();
            document.getElementById('quizScore').textContent = `ניקוד: ${quizScore}/${quizTotal}`;
            document.getElementById('quizNext').classList.remove('hidden');
        }

        function markAsUnsure() {
            if (!currentQuizWord) return;

            const unsureBtn = document.getElementById('quizUnsure');
            const modeData = getModeData();

            if (quizBlacklistOnly) {
                // In blacklist quiz: "Now I know!" removes from blacklist
                if (isBlacklisted(currentQuizWord.en)) {
                    removeFromBlacklist(currentQuizWord.en);
                    addToHistory('removed_from_blacklist', `הוסר מהרשימה השחורה: ${currentQuizWord.en}`);
                    saveUserData(currentUser);
                    updateUserStatsMini();

                    unsureBtn.classList.add('added');
                    unsureBtn.textContent = 'הוסר מהרשימה השחורה!';
                }
            } else {
                // In regular quiz: "Not sure" adds to blacklist
                if (!isBlacklisted(currentQuizWord.en)) {
                    addToBlacklist(currentQuizWord);
                    addToHistory('marked_unsure', `סימן כלא בטוח: ${currentQuizWord.en} (${currentQuizWord.he})`);
                    // Remove from mastered
                    if (modeData.masteredWords) {
                        modeData.masteredWords = modeData.masteredWords.filter(w => w !== currentQuizWord.en);
                    }
                    saveUserData(currentUser);
                    updateUserStatsMini();

                    unsureBtn.classList.add('added');
                    unsureBtn.textContent = 'נוסף לרשימה השחורה';
                }
            }
        }

        function exitQuiz() {
            addToHistory('quiz_end', `סיים מבחן - ניקוד: ${quizScore}/${quizTotal}`);

            document.getElementById('wordsGrid').classList.remove('hidden');
            document.getElementById('quizMode').classList.add('hidden');
            document.getElementById('searchBox').classList.remove('hidden');
            document.getElementById('controls').classList.remove('hidden');
            document.getElementById('stats').classList.remove('hidden');
            currentList = 'all';
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.list === 'all');
            });
            renderWords(getAllWords());
        }

        function showHistory() {
            document.getElementById('wordsGrid').classList.add('hidden');
            document.getElementById('searchBox').classList.add('hidden');
            document.getElementById('controls').classList.add('hidden');
            document.getElementById('stats').classList.add('hidden');
            document.getElementById('historyPanel').classList.remove('hidden');

            const modeData = getModeData();
            const stats = modeData.stats;
            const accuracy = stats.totalAnswers > 0
                ? Math.round((stats.correctAnswers / stats.totalAnswers) * 100)
                : 0;

            const totalWords = getAllWords().length;
            const mastered = getMasteredWords().length;
            const modeLabel = currentMode === 'en-to-he' ? 'אנגלית → עברית' : 'עברית → אנגלית';

            document.getElementById('historyStats').innerHTML = `
                <div class="stat-card" style="grid-column: span 2;">
                    <div class="number">${modeLabel}</div>
                    <div class="label">מצב נוכחי</div>
                </div>
                <div class="stat-card">
                    <div class="number">${mastered}/${totalWords}</div>
                    <div class="label">מילים ששולט בהן</div>
                </div>
                <div class="stat-card">
                    <div class="number">${stats.totalQuizzes}</div>
                    <div class="label">מבחנים</div>
                </div>
                <div class="stat-card">
                    <div class="number">${accuracy}%</div>
                    <div class="label">דיוק</div>
                </div>
                <div class="stat-card">
                    <div class="number">${modeData.blacklist.length}</div>
                    <div class="label">ברשימה שחורה</div>
                </div>
            `;

            const historyList = document.getElementById('historyList');
            historyList.innerHTML = '';

            currentUser.history.slice(0, 50).forEach(item => {
                const div = document.createElement('div');
                div.className = 'history-item';
                const date = new Date(item.date);
                const dateStr = `${date.toLocaleDateString('he-IL')} ${date.toLocaleTimeString('he-IL', {hour: '2-digit', minute: '2-digit'})}`;

                let resultClass = '';
                if (item.action === 'wrong_answer') resultClass = 'bad';
                if (item.action === 'quiz_end' && item.details.includes('100%')) resultClass = 'good';

                div.innerHTML = `
                    <span class="date">${dateStr}</span>
                    <span class="action">${item.details}</span>
                `;
                historyList.appendChild(div);
            });

            if (currentUser.history.length === 0) {
                historyList.innerHTML = '<div style="text-align: center; padding: 20px; color: #666;">אין היסטוריה עדיין</div>';
            }
        }

        function hideHistory() {
            document.getElementById('wordsGrid').classList.remove('hidden');
            document.getElementById('searchBox').classList.remove('hidden');
            document.getElementById('controls').classList.remove('hidden');
            document.getElementById('stats').classList.remove('hidden');
            document.getElementById('historyPanel').classList.add('hidden');
        }

        // Event listeners
        document.getElementById('loginBtn').addEventListener('click', () => {
            login(document.getElementById('usernameInput').value);
        });

        document.getElementById('usernameInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                login(document.getElementById('usernameInput').value);
            }
        });

        document.getElementById('logoutBtn').addEventListener('click', logout);
        document.getElementById('historyBtn').addEventListener('click', showHistory);
        document.getElementById('closeHistory').addEventListener('click', hideHistory);

        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');

                if (btn.dataset.list === 'quiz') {
                    startQuiz(false);
                } else {
                    if (!document.getElementById('quizMode').classList.contains('hidden')) {
                        exitQuiz();
                    }
                    currentList = btn.dataset.list;
                    renderWords(filterWords());
                }
            });
        });

        document.getElementById('quizUnsure').addEventListener('click', markAsUnsure);

        document.getElementById('blacklistQuizBtn').addEventListener('click', () => {
            startQuiz(true);
        });

        document.getElementById('searchInput').addEventListener('input', () => {
            renderWords(filterWords());
        });

        document.getElementById('revealAll').addEventListener('click', () => {
            document.querySelectorAll('.word-card').forEach(card => {
                card.classList.add('revealed');
            });
        });

        document.getElementById('hideAll').addEventListener('click', () => {
            document.querySelectorAll('.word-card').forEach(card => {
                card.classList.remove('revealed');
            });
        });

        document.getElementById('shuffle').addEventListener('click', () => {
            let words = filterWords();
            renderWords(shuffleArray([...words]));
        });

        document.getElementById('quizNext').addEventListener('click', () => {
            document.getElementById('quizUnsure').classList.add('hidden');
            quizIndex++;
            showQuizQuestion();
        });

        document.getElementById('quizExit').addEventListener('click', exitQuiz);

        // Mode toggle listeners
        document.querySelectorAll('.mode-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                if (btn.dataset.mode === currentMode) return;

                document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentMode = btn.dataset.mode;

                updateUserStatsMini();

                // If in quiz, exit and refresh
                if (!document.getElementById('quizMode').classList.contains('hidden')) {
                    exitQuiz();
                }

                // Refresh the word list
                renderWords(filterWords());
            });
        });

        // Initialize
        showExistingUsers();
    </script>
</body>
</html>
